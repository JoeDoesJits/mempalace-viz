<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- MemPalaceViz favicon — optimized for 16-32px -->
  <defs>
    <radialGradient id="orbFav" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#2a3a7c"/>
      <stop offset="55%" stop-color="#2d1b69"/>
      <stop offset="100%" stop-color="#0a0520"/>
    </radialGradient>
    <radialGradient id="glowFav" cx="50%" cy="50%" r="50%">
      <stop offset="55%" stop-color="#4dd9e8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#4dd9e8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Outer glow -->
  <circle cx="16" cy="16" r="15" fill="url(#glowFav)"/>

  <!-- Orb -->
  <circle cx="16" cy="16" r="12" fill="url(#orbFav)"/>

  <!-- 4 compass + center (simplified for small sizes) -->
  <circle cx="16" cy="10" r="1.4" fill="#ff6b9d"/>
  <circle cx="22" cy="16" r="1.4" fill="#6ee7b7"/>
  <circle cx="16" cy="22" r="1.4" fill="#a78bfa"/>
  <circle cx="10" cy="16" r="1.4" fill="#ffd93d"/>
  <circle cx="16" cy="16" r="2" fill="#4dd9e8"/>

  <!-- Glass highlight -->
  <ellipse cx="12" cy="11" rx="2.5" ry="1.6" fill="#ffffff" opacity="0.35"/>
  <circle cx="11" cy="10" r="0.8" fill="#ffffff" opacity="0.85"/>
</svg>
