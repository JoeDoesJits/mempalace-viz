<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- MemPalaceViz logo — Crystal orb containing the 8-room memory palace constellation -->
  <defs>
    <radialGradient id="orb" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#1a2a5c"/>
      <stop offset="50%" stop-color="#2d1b69"/>
      <stop offset="100%" stop-color="#0a0520"/>
    </radialGradient>
    <radialGradient id="innerGlow" cx="35%" cy="30%" r="35%">
      <stop offset="0%" stop-color="#4dd9e8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#4dd9e8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="outerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="#4dd9e8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4dd9e8" stop-opacity="0"/>
    </radialGradient>
    <filter id="starGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer aura -->
  <circle cx="64" cy="64" r="60" fill="url(#outerGlow)"/>

  <!-- Orb body (night sky) -->
  <circle cx="64" cy="64" r="44" fill="url(#orb)"/>

  <!-- Connection lines (behind nodes) -->
  <g opacity="0.45" stroke="#4dd9e8" stroke-width="0.7" fill="none">
    <line x1="64" y1="64" x2="64" y2="40"/>
    <line x1="64" y1="64" x2="81" y2="47"/>
    <line x1="64" y1="64" x2="88" y2="64"/>
    <line x1="64" y1="64" x2="81" y2="81"/>
    <line x1="64" y1="64" x2="64" y2="88"/>
    <line x1="64" y1="64" x2="47" y2="81"/>
    <line x1="64" y1="64" x2="40" y2="64"/>
    <line x1="64" y1="64" x2="47" y2="47"/>
  </g>

  <!-- 8-room constellation -->
  <g filter="url(#starGlow)">
    <circle cx="64" cy="40" r="2.8" fill="#ff6b9d"/>
    <circle cx="81" cy="47" r="2.8" fill="#ffd93d"/>
    <circle cx="88" cy="64" r="2.8" fill="#6ee7b7"/>
    <circle cx="81" cy="81" r="2.8" fill="#a78bfa"/>
    <circle cx="64" cy="88" r="2.8" fill="#fb7185"/>
    <circle cx="47" cy="81" r="2.8" fill="#60a5fa"/>
    <circle cx="40" cy="64" r="2.8" fill="#f97316"/>
    <circle cx="47" cy="47" r="2.8" fill="#fbbf24"/>
    <!-- Center (palace root) -->
    <circle cx="64" cy="64" r="4.5" fill="#4dd9e8"/>
  </g>

  <!-- Inner atmospheric glow -->
  <circle cx="64" cy="64" r="44" fill="url(#innerGlow)"/>

  <!-- Glass highlight (specular) -->
  <ellipse cx="50" cy="46" rx="14" ry="10" fill="#ffffff" opacity="0.12"/>
  <ellipse cx="46" cy="42" rx="4.5" ry="2.8" fill="#ffffff" opacity="0.75"/>

  <!-- Rim accent -->
  <circle cx="64" cy="64" r="43.5" fill="none" stroke="#4dd9e8" stroke-width="0.5" opacity="0.4"/>
</svg>
